<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니 점수판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #171717; /* neutral-900 */
            background-image: radial-gradient(circle, #333 1px, transparent 1px);
            background-size: 10px 10px;
            user-select: none;
            -webkit-user-select: none;
        }
        /* 클릭 시 파란색 하이라이트 제거 */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <!-- 상단 타이머 섹션 -->
    <div class="bg-gray-800 text-white rounded-2xl p-6 mb-8 shadow-2xl border border-gray-700 w-full max-w-2xl">
        <div class="flex flex-col items-center justify-center gap-4">
            <div id="timeDisplay" class="text-6xl font-mono font-bold tracking-wider text-yellow-400 drop-shadow-md">
                10:00
            </div>
            
            <div class="flex gap-4">
                <button onclick="adjustTime(-60)" id="btnMinus" class="p-2 bg-gray-700 hover:bg-gray-600 rounded-full disabled:opacity-50 transition-colors" title="1분 감소">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                
                <button onclick="toggleTimer()" id="btnToggle" class="flex items-center gap-2 px-6 py-2 rounded-full font-bold transition-colors bg-green-500 hover:bg-green-600">
                    <span id="iconPlay" class="flex items-center gap-2">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> 시작
                    </span>
                    <span id="iconPause" class="hidden flex items-center gap-2">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg> 일시정지
                    </span>
                </button>
                
                <button onclick="resetTimer()" class="flex items-center gap-2 px-6 py-2 bg-gray-700 hover:bg-gray-600 rounded-full font-bold transition-colors">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg> 초기화
                </button>
                
                <button onclick="adjustTime(60)" id="btnPlus" class="p-2 bg-gray-700 hover:bg-gray-600 rounded-full disabled:opacity-50 transition-colors" title="1분 추가">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 점수판 섹션 -->
    <div class="flex flex-col md:flex-row gap-8 w-full max-w-5xl justify-center items-center">
        
        <!-- 파란색 팀 -->
        <div class="flex flex-col items-center gap-4 w-full md:w-1/2">
            <div onclick="addScore('blue', 1)" class="relative w-full aspect-[3/4] max-h-[500px] bg-blue-600 rounded-2xl shadow-[0_10px_20px_rgba(0,0,0,0.5)] cursor-pointer hover:bg-blue-500 transition-colors flex items-center justify-center border-t border-blue-400 active:scale-[0.98]">
                <!-- 스프링 링 UI -->
                <div class="absolute -top-4 left-0 right-0 flex justify-center gap-4 z-10 w-full px-8 opacity-80 pointer-events-none">
                    <div class="w-3 h-10 border-4 border-gray-900 rounded-full bg-gray-400/20 shadow-sm"></div>
                    <div class="w-3 h-10 border-4 border-gray-900 rounded-full bg-gray-400/20 shadow-sm"></div>
                    <div class="w-3 h-10 border-4 border-gray-900 rounded-full bg-gray-400/20 shadow-sm"></div>
                    <div class="w-3 h-10 border-4 border-gray-900 rounded-full bg-gray-400/20 shadow-sm"></div>
                    <div class="w-3 h-10 border-4 border-gray-900 rounded-full bg-gray-400/20 shadow-sm"></div>
                </div>
                <!-- 중앙 가로선 -->
                <div class="absolute w-full h-[1px] bg-black/20 top-1/2 left-0 shadow-[0_1px_0_rgba(255,255,255,0.2)]"></div>
                
                <span id="blueScoreDisplay" class="text-[12rem] md:text-[16rem] font-bold text-white drop-shadow-xl leading-none tracking-tighter">0</span>
                <div class="absolute bottom-6 text-blue-200/50 text-xl font-bold tracking-widest uppercase">Team Blue</div>
            </div>
            <div class="flex gap-4">
                <button onclick="addScore('blue', -1)" class="px-6 py-3 bg-gray-800 text-gray-300 hover:text-white hover:bg-gray-700 rounded-xl font-bold flex items-center gap-2 transition-colors shadow-lg border border-gray-600">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg> 점수 되돌리기 (-1)
                </button>
            </div>
        </div>

        <!-- 빨간색 팀 -->
        <div class="flex flex-col items-center gap-4 w-full md:w-1/2">
            <div onclick="addScore('red', 1)" class="relative w-full aspect-[3/4] max-h-[500px] bg-red-600 rounded-2xl shadow-[0_10px_20px_rgba(0,0,0,0.5)] cursor-pointer hover:bg-red-500 transition-colors flex items-center justify-center border-t border-red-400 active:scale-[0.98]">
                <!-- 스프링 링 UI -->
                <div class="absolute -top-4 left-0 right-0 flex justify-center gap-4 z-10 w-full px-8 opacity-80 pointer-events-none">
                    <div class="w-3 h-10 border-4 border-gray-900 rounded-full bg-gray-400/20 shadow-sm"></div>
                    <div class="w-3 h-10 border-4 border-gray-900 rounded-full bg-gray-400/20 shadow-sm"></div>
                    <div class="w-3 h-10 border-4 border-gray-900 rounded-full bg-gray-400/20 shadow-sm"></div>
                    <div class="w-3 h-10 border-4 border-gray-900 rounded-full bg-gray-400/20 shadow-sm"></div>
                    <div class="w-3 h-10 border-4 border-gray-900 rounded-full bg-gray-400/20 shadow-sm"></div>
                </div>
                <!-- 중앙 가로선 -->
                <div class="absolute w-full h-[1px] bg-black/20 top-1/2 left-0 shadow-[0_1px_0_rgba(255,255,255,0.2)]"></div>
                
                <span id="redScoreDisplay" class="text-[12rem] md:text-[16rem] font-bold text-white drop-shadow-xl leading-none tracking-tighter">0</span>
                <div class="absolute bottom-6 text-red-200/50 text-xl font-bold tracking-widest uppercase">Team Red</div>
            </div>
            <div class="flex gap-4">
                <button onclick="addScore('red', -1)" class="px-6 py-3 bg-gray-800 text-gray-300 hover:text-white hover:bg-gray-700 rounded-xl font-bold flex items-center gap-2 transition-colors shadow-lg border border-gray-600">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg> 점수 되돌리기 (-1)
                </button>
            </div>
        </div>

    </div>

    <!-- 점수 초기화 버튼 (새로 추가된 부분) -->
    <div class="mt-8 flex justify-center w-full">
        <button onclick="resetScores()" class="flex items-center gap-2 px-8 py-3 bg-gray-800 text-red-400 hover:bg-gray-700 hover:text-red-300 rounded-full font-bold transition-colors shadow-lg border border-gray-700">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
            양팀 점수 초기화
        </button>
    </div>

    <div class="mt-12 text-gray-500 text-sm">
        💡 점수판 배경(색상 부분)을 클릭하면 1점씩 올라갑니다.
    </div>

    <script>
        // 점수 상태
        let blueScore = 0;
        let redScore = 0;

        // 타이머 상태 (단위: 초)
        let time = 600; 
        let isRunning = false;
        let timerInterval = null;

        // DOM 요소 가져오기
        const blueScoreDisplay = document.getElementById('blueScoreDisplay');
        const redScoreDisplay = document.getElementById('redScoreDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const btnToggle = document.getElementById('btnToggle');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');
        const btnMinus = document.getElementById('btnMinus');
        const btnPlus = document.getElementById('btnPlus');

        // 점수 변경 함수
        function addScore(team, amount) {
            if (team === 'blue') {
                blueScore = Math.max(0, blueScore + amount);
                blueScoreDisplay.innerText = blueScore;
            } else {
                redScore = Math.max(0, redScore + amount);
                redScoreDisplay.innerText = redScore;
            }
        }

        // 양팀 점수 초기화 함수 (새로 추가된 부분)
        function resetScores() {
            blueScore = 0;
            redScore = 0;
            blueScoreDisplay.innerText = blueScore;
            redScoreDisplay.innerText = redScore;
        }

        // 시간 포맷 함수 (MM:SS)
        function updateTimeDisplay() {
            const m = Math.floor(time / 60).toString().padStart(2, '0');
            const s = (time % 60).toString().padStart(2, '0');
            timeDisplay.innerText = `${m}:${s}`;
        }

        // 시간 조절 (+1분, -1분)
        function adjustTime(amount) {
            if (!isRunning) {
                time = Math.max(0, time + amount);
                updateTimeDisplay();
            }
        }

        // 타이머 UI 업데이트 (버튼 색상 및 아이콘)
        function updateTimerUI() {
            if (isRunning) {
                btnToggle.classList.replace('bg-green-500', 'bg-red-500');
                btnToggle.classList.replace('hover:bg-green-600', 'hover:bg-red-600');
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
                btnMinus.disabled = true;
                btnPlus.disabled = true;
            } else {
                btnToggle.classList.replace('bg-red-500', 'bg-green-500');
                btnToggle.classList.replace('hover:bg-red-600', 'hover:bg-green-600');
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
                btnMinus.disabled = false;
                btnPlus.disabled = false;
            }
        }

        // 시작/일시정지 토글
        function toggleTimer() {
            isRunning = !isRunning;
            updateTimerUI();

            if (isRunning) {
                timerInterval = setInterval(() => {
                    if (time > 0) {
                        time--;
                        updateTimeDisplay();
                    } else {
                        isRunning = false;
                        updateTimerUI();
                        clearInterval(timerInterval);
                    }
                }, 1000);
            } else {
                clearInterval(timerInterval);
            }
        }

        // 타이머 초기화
        function resetTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            time = 600; // 10분
            updateTimeDisplay();
            updateTimerUI();
        }

        // 초기 화면 설정
        updateTimeDisplay();
    </script>
</body>
</html>
